# fly.toml app configuration file generated for microfish on 2026-05-14T12:05:46Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'microfish'
primary_region = 'nrt'

[build]

[env]
  PORT = '8080'
  REPORT_DATA_DIR = '/data/reports'
  SIMULATION_DATA_DIR = '/data/simulations'
  UPLOADS_DIR = '/data/uploads'

[[mounts]]
  source = 'microfish_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
