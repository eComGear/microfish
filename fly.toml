# fly.toml app configuration file generated for microfish on 2026-05-11T11:04:32Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'microfish'
primary_region = 'sin'

[build]

[env]
  FLASK_PORT = '8080'
  PORT = '8080'
  PYTHONUNBUFFERED = '1'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '2m0s'
    method = 'GET'
    path = '/health'

[[vm]]
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 4096
