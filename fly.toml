# fly.toml — MicroFish single-app deployment
app = 'microfish'
primary_region = 'nrt'
kill_signal  = 'SIGTERM'
kill_timeout = '120s'   # give running simulations time to flush to Supabase

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'
  REPORT_DATA_DIR     = '/data/reports'
  SIMULATION_DATA_DIR = '/data/simulations'
  UPLOADS_DIR         = '/data/uploads'
  PYTHONUNBUFFERED    = '1'

[[mounts]]
  source      = 'microfish_data'
  destination = '/data'

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = 'off'   # keep warm — sims run in background threads
  auto_start_machines = true
  min_machines_running = 1
  processes           = ['app']

  [[http_service.checks]]
    interval      = '30s'
    timeout       = '5s'
    grace_period  = '30s'
    method        = 'GET'
    path          = '/health'

[[vm]]
  cpu_kind  = 'shared'
  cpus      = 2          # was 1 — sims are CPU bound
  memory_mb = 2048       # was 1024 — LLM + graph build needs headroom

