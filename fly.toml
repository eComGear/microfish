app = "microfish"
primary_region = "hkg"

[build]

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"

[processes]
  app = "gunicorn -w 1 -k gthread --threads 16 -t 600 --graceful-timeout 120 -b 0.0.0.0:8080 run:app"

[[mounts]]
  source = "microfish_data"
  destination = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 2048

